name: ci

on:
  push:
    branches: [main, v4]
  pull_request:
    branches: [main, v4]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # No `cache: pip` on purpose: the resolved env (torch + lightning +
          # scanpy + numba + cuda libs) is >2 GB of wheels, and the post-job
          # cache-save tar reliably hits the 10-minute step timeout on the
          # GitHub-hosted runners. A cold resolve from a warm PyPI mirror
          # only takes ~25s, so caching is a net loss here.

      - name: Install scsims with test extras
        run: |
          python -m pip install --upgrade pip
          # Install scanpy explicitly because it's a test-only dep used by
          # the synthetic AnnData fixtures.
          pip install -e ".[test]"

      - name: Show resolved environment
        run: |
          python --version
          pip list | grep -iE 'scsims|torch|lightning|torchmetrics|numpy|pandas|scikit|scanpy|anndata|pytorch-tabnet'

      - name: Run pytest
        run: pytest tests/ -v --tb=short
